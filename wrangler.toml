name = "katelyatv"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# 默认 D1 数据库配置（本地调试用）
[[d1_databases]]
binding = "DB"
database_name = "kvideo-db"
database_id = "b001fd1e-a70b-458f-a2aa-8bb9e4e5ef24"

# 生产环境
[env.production]
name = "katelyatv"
compatibility_date = "2024-09-01"

[[env.production.d1_databases]]
binding = "DB"
database_name = "kvideo-db"
database_id = "b001fd1e-a70b-458f-a2aa-8bb9e4e5ef24"

[env.production.vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_SITE_NAME = "KatelyaTV"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://tv.katelya.eu.org"
USERNAME = "katelya"
AUTH_PASSWORD = "ab1433223cd@"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW = "60000"
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_INTERVAL = "30"
LOG_LEVEL = "info"
LOG_FORMAT = "json"
NODE_ENV = "production"

# 预览环境
[env.preview]
name = "katelyatv-preview"
compatibility_date = "2024-09-01"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "kvideo-db"
database_id = "b001fd1e-a70b-458f-a2aa-8bb9e4e5ef24"

[env.preview.vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_SITE_NAME = "KatelyaTV"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://katelyatv.pages.dev"
USERNAME = "katelya"
AUTH_PASSWORD = "ab1433223cd@"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW = "60000"
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_INTERVAL = "30"
LOG_LEVEL = "info"
LOG_FORMAT = "json"
NODE_ENV = "production"