# 全局项目基础配置（必须放在最顶部）
name = "katelyatv"
# 补齐必填兼容日期，解决nodejs兼容、D1失效崩溃
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# 全局 D1 数据库绑定（仅本地 wrangler dev 调试生效）
[[d1_databases]]
binding = "DB"
database_name = "kvideo-db"
database_id = "b001fd1e-a70b-458f-a2aa-8bb9e4e5ef24"

# 生产环境环境变量
[env.production]
name = "katelyatv"

[env.production.vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_SITE_NAME = "KatelyaTV"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://katelyatv-whl.pages.dev"
USERNAME = "katelya"
AUTH_PASSWORD = "ab1433223cd@"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW = "60000"
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_INTERVAL = "30"
LOG_LEVEL = "info"
LOG_FORMAT = "json"
NODE_ENV = "production"

# 预览环境环境变量
[env.preview]
name = "katelyatv-preview"

[env.preview.vars]
NEXT_PUBLIC_STORAGE_TYPE = "d1"
NEXT_PUBLIC_SITE_NAME = "KatelyaTV"
NEXT_PUBLIC_SITE_DESCRIPTION = "高性能影视播放平台"
NEXTAUTH_URL = "https://katelyatv-whl.pages.dev"
USERNAME = "katelya"
AUTH_PASSWORD = "ab1433223cd@"
IMAGE_PROXY_ENABLED = "true"
CACHE_TTL = "3600"
CORS_ORIGIN = "*"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW = "60000"
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_INTERVAL = "30"
LOG_LEVEL = "info"
LOG_FORMAT = "json"
NODE_ENV = "production"